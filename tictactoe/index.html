<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      min-height: 1.6em;
      letter-spacing: 0.05em;
      color: #c4b5fd;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #1e1e30;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      border: 2px solid #2e2e48;
    }

    .cell:hover:not(.taken) {
      background: #2a2a42;
      transform: scale(1.04);
    }

    .cell.x { color: #a78bfa; }
    .cell.o { color: #60a5fa; }

    .cell.win {
      background: #2d1f4a;
      border-color: #a78bfa;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 8px #a78bfa88; }
      to   { box-shadow: 0 0 22px #a78bfa; }
    }

    #restart {
      margin-top: 1.6rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      transition: opacity 0.2s, transform 0.1s;
    }
    #restart:hover { opacity: 0.88; transform: scale(1.03); }
    #restart:active { transform: scale(0.98); }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-top: 1.8rem;
      font-size: 0.95rem;
    }
    .score-box { text-align: center; }
    .score-box span { display: block; font-size: 1.6rem; font-weight: 700; }
    .score-box.x span { color: #a78bfa; }
    .score-box.o span { color: #60a5fa; }
    .score-box.d span { color: #6b7280; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">Restart</button>

  <div id="score">
    <div class="score-box x"><span id="sx">0</span>X Wins</div>
    <div class="score-box d"><span id="sd">0</span>Draws</div>
    <div class="score-box o"><span id="so">0</span>O Wins</div>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over, score = {X:0, O:0, D:0};
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const sx = document.getElementById('sx');
    const so = document.getElementById('so');
    const sd = document.getElementById('sd');

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      status.textContent = "Player X's turn";
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return [a,b,c];
      }
      return null;
    }

    function play(i) {
      if (over || board[i]) return;
      board[i] = current;
      const cell = cells[i];
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const win = checkWin();
      if (win) {
        win.forEach(idx => cells[idx].classList.add('win'));
        status.textContent = `Player ${current} wins! 🎉`;
        score[current]++;
        updateScore();
        over = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a draw! 🤝";
        score.D++;
        updateScore();
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `Player ${current}'s turn`;
      }
    }

    function updateScore() {
      sx.textContent = score.X;
      so.textContent = score.O;
      sd.textContent = score.D;
    }

    cells.forEach(c => c.addEventListener('click', () => play(+c.dataset.i)));
    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
