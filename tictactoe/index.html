<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #2b1a0e;
      background-image:
        radial-gradient(ellipse at top, #3d2410 0%, #1a0d05 100%);
      font-family: Georgia, 'Times New Roman', serif;
      color: #f0d9b5;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.12em;
      margin-bottom: 0.4rem;
      color: #f0d9b5;
      text-shadow: 0 2px 6px #0008;
      text-transform: uppercase;
    }

    #status {
      font-size: 1.05rem;
      margin-bottom: 1.4rem;
      min-height: 1.6em;
      letter-spacing: 0.06em;
      color: #c8a97a;
      font-style: italic;
    }

    /* Wooden frame around the board */
    #frame {
      padding: 18px;
      background: linear-gradient(145deg, #7a4a1e, #4a2a0a, #7a4a1e);
      border-radius: 6px;
      box-shadow:
        0 0 0 3px #c8922a,
        0 0 0 6px #7a4a1e,
        0 8px 40px #0009,
        inset 0 1px 3px #c8922a44;
      position: relative;
    }

    /* Coordinate labels */
    #frame::before {
      content: '1   2   3';
      position: absolute;
      bottom: -26px;
      left: 18px;
      right: 18px;
      text-align: center;
      font-size: 0.85rem;
      letter-spacing: 2.6em;
      padding-left: 1.3em;
      color: #c8a97a;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 0;
      border: 2px solid #1a0d05;
    }

    /* Chessboard alternating squares: light on even (0,2,4,6,8), dark on odd */
    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
      transition: filter 0.12s;
      position: relative;
    }

    /* cells 0,2,4,6,8 → light square */
    .cell[data-i="0"], .cell[data-i="2"],
    .cell[data-i="4"], .cell[data-i="6"],
    .cell[data-i="8"] {
      background: #f0d9b5;
    }
    /* cells 1,3,5,7 → dark square */
    .cell[data-i="1"], .cell[data-i="3"],
    .cell[data-i="5"], .cell[data-i="7"] {
      background: #b58863;
    }

    .cell:hover:not(.taken) {
      filter: brightness(1.15);
      cursor: pointer;
    }
    .cell:hover:not(.taken)::after {
      content: '';
      position: absolute;
      inset: 0;
      background: #fff2;
    }

    /* X is dark piece, O is light piece — classic chess contrast */
    .cell.x { color: #1a1a1a; text-shadow: 1px 2px 4px #0006; }
    .cell.o { color: #fff8f0; text-shadow: 1px 2px 4px #0008; }

    /* Winning squares get a green tint like in chess.com */
    .cell.win {
      filter: brightness(1.0);
    }
    .cell[data-i="0"].win, .cell[data-i="2"].win,
    .cell[data-i="4"].win, .cell[data-i="6"].win,
    .cell[data-i="8"].win {
      background: #cdd16f;
    }
    .cell[data-i="1"].win, .cell[data-i="3"].win,
    .cell[data-i="5"].win, .cell[data-i="7"].win {
      background: #aaa23a;
    }

    #restart {
      margin-top: 2.2rem;
      padding: 0.55rem 2rem;
      font-size: 0.95rem;
      font-family: Georgia, serif;
      font-weight: bold;
      letter-spacing: 0.1em;
      border: 2px solid #c8922a;
      border-radius: 4px;
      cursor: pointer;
      background: linear-gradient(145deg, #7a4a1e, #4a2a0a);
      color: #f0d9b5;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 2px 8px #0006;
    }
    #restart:hover { background: linear-gradient(145deg, #9a6a3e, #6a4a1a); transform: scale(1.03); }
    #restart:active { transform: scale(0.97); }

    #score {
      display: flex;
      gap: 3rem;
      margin-top: 1.6rem;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }
    .score-box { text-align: center; }
    .score-box span { display: block; font-size: 1.7rem; font-weight: 700; color: #f0d9b5; }
    .score-box.x { color: #b58863; }
    .score-box.o { color: #c8a97a; }
    .score-box.d { color: #888; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>

  <div id="frame">
    <div id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>
  </div>

  <button id="restart">New Game</button>

  <div id="score">
    <div class="score-box x"><span id="sx">0</span>X Wins</div>
    <div class="score-box d"><span id="sd">0</span>Draws</div>
    <div class="score-box o"><span id="so">0</span>O Wins</div>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over, score = {X:0, O:0, D:0};
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const sx = document.getElementById('sx');
    const so = document.getElementById('so');
    const sd = document.getElementById('sd');

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => { c.textContent = ''; c.classList.remove('taken','x','o','win'); });
      status.textContent = "Player X's turn";
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return [a,b,c];
      }
      return null;
    }

    function play(i) {
      if (over || board[i]) return;
      board[i] = current;
      const cell = cells[i];
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const win = checkWin();
      if (win) {
        win.forEach(idx => cells[idx].classList.add('win'));
        status.textContent = `Player ${current} wins! 🎉`;
        score[current]++;
        updateScore();
        over = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a draw! 🤝";
        score.D++;
        updateScore();
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `Player ${current}'s turn`;
      }
    }

    function updateScore() {
      sx.textContent = score.X;
      so.textContent = score.O;
      sd.textContent = score.D;
    }

    cells.forEach(c => c.addEventListener('click', () => play(+c.dataset.i)));
    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
